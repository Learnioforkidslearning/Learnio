<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Learniokidslearning</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<section class="contact">
    <h2>📝 Create Your Account</h2>

    <!-- IMPORTANT: onsubmit="signupUser(event)" -->
    <form onsubmit="signupUser(event)">
        
        <!-- Full Name -->
        <input
            type="text"
            id="signupName"
            placeholder="Parent or Student Name"
            required
        />

        <!-- Email Address -->
        <input
            type="email"
            id="signupEmail"
            placeholder="Email Address"
            required
        />

        <!-- Password -->
        <input
            type="password"
            id="signupPassword"
            placeholder="Create Password"
            minlength="6"
            required
        />

        <!-- Gender Selection -->
        <div style="margin: 20px 0; text-align: left;">
            <label style="display: block; margin-bottom: 10px; font-weight: 600;">
                Select Gender:
            </label>

            <label style="margin-right: 20px;">
                <input
                    type="radio"
                    name="gender"
                    value="Male"
                    required
                />
                Male
            </label>

            <label style="margin-right: 20px;">
                <input
                    type="radio"
                    name="gender"
                    value="Female"
                />
                Female
            </label>

            <label>
                <input
                    type="radio"
                    name="gender"
                    value="Other"
                />
                Other
            </label>
        </div>

        <!-- Age -->
        <input
            type="number"
            id="signupAge"
            placeholder="Enter Age"
            min="1"
            max="100"
            required
        />

        <!-- Submit Button -->
        <button type="submit">Create Account</button>
    </form>

    <p style="text-align:center; margin-top:20px;">
        Already have an account?
        <a href="login.html">Login Here</a>
    </p>
</section>

<!-- IMPORTANT: type="module" is required for Firebase imports -->
<script type="module" src="script.js"></script>

</body>
</html>
